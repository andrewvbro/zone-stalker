<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Courier New, monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2418"/>
      <stop offset="55%" stop-color="#3c4636"/>
      <stop offset="100%" stop-color="#5a5e46"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4029"/>
      <stop offset="100%" stop-color="#181c10"/>
    </linearGradient>
    <radialGradient id="anom" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#eaffb0"/>
      <stop offset="35%" stop-color="#9bdb1d"/>
      <stop offset="100%" stop-color="#9bdb1d00"/>
    </radialGradient>
    <radialGradient id="haze" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#9bdb1d22"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>
  </defs>

  <!-- sky + ground -->
  <rect width="1200" height="330" fill="url(#sky)"/>
  <rect y="330" width="1200" height="150" fill="url(#ground)"/>
  <rect width="1200" height="480" fill="url(#haze)"/>

  <!-- distant Chernobyl skyline: cooling towers + reactor stack -->
  <g fill="#2a2e26" opacity="0.85">
    <path d="M150 330 Q165 250 158 200 Q150 250 130 200 Q123 250 138 330 Z"/>
    <path d="M250 330 Q268 245 260 190 Q250 248 226 190 Q218 248 236 330 Z"/>
    <rect x="900" y="210" width="120" height="120"/>
    <rect x="1015" y="120" width="14" height="210"/>
    <rect x="1011" y="150" width="22" height="8" fill="#cc4030"/>
    <rect x="1011" y="190" width="22" height="8" fill="#cc4030"/>
  </g>

  <!-- dead trees -->
  <g stroke="#15180e" stroke-width="5" opacity="0.9">
    <path d="M70 330 L70 250 M70 280 L52 262 M70 270 L88 250" fill="none"/>
    <path d="M1130 330 L1130 240 M1130 275 L1112 255 M1130 265 L1150 245" fill="none"/>
    <path d="M460 330 L460 268 M460 292 L446 278 M460 285 L476 270" fill="none"/>
  </g>

  <!-- anomaly with floating artifact -->
  <ellipse cx="430" cy="345" rx="120" ry="40" fill="url(#anom)" opacity="0.55"/>
  <circle cx="430" cy="300" r="13" fill="#eaffb0"/>
  <circle cx="430" cy="300" r="24" fill="none" stroke="#9bdb1d" stroke-width="2" opacity="0.6"/>

  <!-- stalker silhouette with rifle (foreground) -->
  <g transform="translate(800,330)" fill="#0c0f08">
    <ellipse cx="0" cy="6" rx="46" ry="10" opacity="0.5"/>
    <rect x="-14" y="-78" width="28" height="62" rx="8"/>            <!-- torso -->
    <circle cx="0" cy="-92" r="13"/>                                 <!-- head -->
    <rect x="-9" cy="0" y="-18" width="9" height="22"/>              <!-- leg -->
    <rect x="2" y="-18" width="9" height="22"/>                      <!-- leg -->
    <rect x="6" y="-66" width="58" height="8" rx="2" transform="rotate(-8 6 -62)"/>  <!-- rifle -->
    <rect x="36" y="-70" width="8" height="16" transform="rotate(-8 40 -62)"/>
  </g>

  <!-- title -->
  <text x="60" y="120" font-size="86" font-weight="bold" fill="#cdd9a8" letter-spacing="10"
        style="paint-order:stroke" stroke="#0a0d06" stroke-width="2">THE ZONE</text>
  <text x="64" y="158" font-size="20" fill="#9bdb1d" letter-spacing="6">A S.T.A.L.K.E.R.-LIKE SURVIVAL SHOOTER</text>
  <text x="64" y="186" font-size="15" fill="#8a9277" letter-spacing="2">anomalies · 10,000 artifacts · mutants · factions · the Chernobyl ruin</text>
</svg>
